
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./.env.docker.example:/app/.env
      - ./src:/app
      - ./models:/app/models
      - ./output:/app/output
      - ./data:/app/data
    depends_on:
      - postgres
  
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-faces}
      POSTGRES_USER: ${POSTGRES_USER:-faces_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faces_pass}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-faces_user}", "-d", "${POSTGRES_DB:-faces}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    post_start:
      - command:
          - psql
          - -U
          - ${POSTGRES_USER:-faces_user}
          - -d
          - ${POSTGRES_DB:-faces}
          - -c
          - CREATE EXTENSION IF NOT EXISTS vector;

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  pgdata:
